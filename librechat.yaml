version: 1.1.4

endpoints:
  custom:
    - name: "LiteLLMVertex"
      baseURL: "https://litellm-308665817092.us-west1.run.app/v1/chat/completions"
      authorizationType: "none"
      models:
        default:
          - "vertex-claude"
          - "vertex-llama"
        list:
          - model: "vertex-claude"
            label: "Claude via Vertex"
          - model: "vertex-llama"
            label: "LLaMA via Vertex"
      titleConvo: true
      titleModel: "vertex-claude"
      summarize: false
      summaryModel: "vertex-claude"
      forcePrompt: false
      dropParams:
        - "stop"
        - "frequency_penalty"
      modelDisplayLabel: "Vertex via LiteLLM"

    - name: "Perplexity"
      apiKey: "${PERPLEXITY_API_KEY}"
      baseURL: "https://api.perplexity.ai/"
      models:
        default:
          - "sonar-pro"
          - "sonar"
        list:
          - model: "sonar-pro"
            label: "Sonar Pro"
          - model: "sonar"
            label: "Sonar"
      fetch: false
      titleConvo: true
      titleModel: "sonar"
      summarize: false
      summaryModel: "sonar"
      forcePrompt: false
      dropParams:
        - "stop"
        - "frequency_penalty"
      modelDisplayLabel: "Perplexity"
